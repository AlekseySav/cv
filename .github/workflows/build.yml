name: Build CV

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-lang-cyrillic \
            texlive-fonts-recommended

      - name: Install tools
        run: pip install jinja2-cli check-jsonschema

      - name: Generate PDFs
        run: |
          chmod +x tools/generate
          for yaml in data/cv.*.yaml; do
            tools/generate "$yaml"
          done

      - name: Update latest tag
        run: |
          git tag -f latest HEAD
          git push origin -f refs/tags/latest

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          files: build/*.pdf
          make_latest: true
